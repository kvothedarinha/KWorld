/* ─────────────────────────────────────────
   DRAW ONE CLOUD onto canvas
───────────────────────────────────────── */
function drawCloud(ctx, cloud, W, H, t, mx, my) {
  const s = W / 1200;
  const dX = Math.sin(t / (cloud.dPX||20000)) * (cloud.dAX||20) * s  +  mx * (cloud.depth||.5) * 44 * s;
  const dY = Math.cos(t / (cloud.dPY||16000)) * (cloud.dAY||10) * s  +  my * (cloud.depth||.5) * 22 * s;
  const ox = cloud.cx * W + dX;
  const oy = cloud.cy * H + dY;

  cloud.puffs.forEach(p => {
    const px = ox + p.dx * s;
    const py = oy + p.dy * s;
    const pr = p.r * s;

    // Puff body
    const g = ctx.createRadialGradient(px, py - pr*.1, 0, px, py, pr);
    g.addColorStop(0,    'rgba(255,255,255,0.96)');
    g.addColorStop(0.50, 'rgba(255,255,255,0.82)');
    g.addColorStop(0.78, 'rgba(255,255,255,0.38)');
    g.addColorStop(1,    'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();

    // Underside blue-gray shadow
    const sg = ctx.createRadialGradient(px, py + pr*.52, 0, px, py + pr*.52, pr*.68);
    sg.addColorStop(0,   'rgba(168,206,228,0.28)');
    sg.addColorStop(1,   'rgba(168,206,228,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(px, py + pr*.48, pr*.72, pr*.36, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function Favicon({ src, name, size=52 }) {
  const [err, setErr] = useState(false);
  if (!src || err) return (
    <div style={{ width:size, height:size, borderRadius:12, background:'rgba(100,178,220,.13)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'Fraunces',serif", fontStyle:'italic', fontSize:size*.44, color:'#5aaac8' }}>
      {name[0].toUpperCase()}
    </div>
  );
  return <img src={src} alt={name} onError={() => setErr(true)} style={{ width:size, height:size, objectFit:'contain', borderRadius:12, display:'block' }}/>;
}

/* ─────────────────────────────────────────
   MAIN APP
───────────────────────────────────────── */
function App() {
  const canvasRef  = useRef(null);
  const islandRef  = useRef(null);
  const stateRef   = useRef({ mx:0, my:0, tmx:0, tmy:0 });
  const [showCards, setShowCards] = useState(false);

  /* mouse tracking */
  const onMove = useCallback(e => {
    stateRef.current.tmx = (e.clientX / window.innerWidth  - .5) * 2;
    stateRef.current.tmy = (e.clientY / window.innerHeight - .5) * 2;
  }, []);

  /* main RAF loop — canvas + island */
  useEffect(() => {
    const canvas = canvasRef.current;
    let raf;
    const t0 = Date.now();

    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    resize();

    const render = () => {
      const { mx, my, tmx, tmy } = stateRef.current;
      stateRef.current.mx = mx + (tmx - mx) * .055;
      stateRef.current.my = my + (tmy - my) * .055;
      const smx = stateRef.current.mx;
      const smy = stateRef.current.my;

      const W = canvas.width, H = canvas.height;
      const ctx = canvas.getContext('2d');
      const t = Date.now() - t0;

      /* sky gradient */
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0,    '#55b2d0');
      sky.addColorStop(.30,  '#7ecae6');
      sky.addColorStop(.58,  '#a8dcf4');
      sky.addColorStop(.82,  '#c4ecf8');
      sky.addColorStop(1,    '#d8f4fb');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      /* sun haze */
      const hz = ctx.createRadialGradient(W*.5, H*.32, 0, W*.5, H*.32, W*.42);
      hz.addColorStop(0, 'rgba(255,252,235,.20)');
      hz.addColorStop(1, 'rgba(255,252,235,0)');
      ctx.fillStyle = hz;
      ctx.fillRect(0, 0, W, H);

      /* clouds — sorted back-to-front by depth */
      [...CLOUDS].sort((a,b) => a.depth - b.depth).forEach(c => drawCloud(ctx, c, W, H, t, smx, smy));

      /* island: float + parallax */
      if (islandRef.current) {
        const floatY = Math.sin(t * 2 * Math.PI / 7000) * 13;
        const px = smx * 9;
        const py = smy * 5 + floatY;
        islandRef.current.style.transform = `translate(calc(-50% + ${px}px), calc(-51% + ${py}px))`;
      }

      raf = requestAnimationFrame(render);
    };

    raf = requestAnimationFrame(render);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <div onMouseMove={onMove} style={{ position:'fixed', inset:0 }}>
      {/* sky + clouds */}
      <canvas ref={canvasRef} style={{ position:'absolute', inset:0, zIndex:1 }}/>

      {/* island */}
      <div ref={islandRef} style={{
        position:'absolute', left:'50%', top:'51%',
        width:'clamp(230px,40vw,440px)',
        zIndex:2, willChange:'transform',
      }}>
        <Island onHouseClick={() => setShowCards(true)}/>
      </div>

      {/* brand + hint */}
      {!showCards && (
        <div style={{ position:'absolute', bottom:'clamp(16px,3vw,28px)', left:'50%', zIndex:5, textAlign:'center', pointerEvents:'none', animation:'hintBob 3.2s ease-in-out infinite' }}>
          <div style={{ fontFamily:"'Fraunces',serif", fontStyle:'italic', fontSize:'clamp(10px,1.4vw,13px)', color:'rgba(42,95,135,.58)', letterSpacing:'.07em', marginBottom:5, transform:'translateX(-50%)', position:'relative' }}>
            k<span style={{ color:'rgba(60,120,165,.7)' }}>·</span>world
          </div>
          <div style={{ fontSize:'clamp(9px,1.1vw,11px)', color:'rgba(42,95,135,.46)', fontFamily:"'Fraunces',serif", fontStyle:'italic', fontWeight:300, whiteSpace:'nowrap', transform:'translateX(-50%)', position:'relative' }}>
            clique na casa para entrar
          </div>
        </div>
      )}

      {showCards && <Overlay onClose={() => setShowCards(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K·World</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #080808;
  color: #F0EDE8;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

:root {
  --or: #FF4D00;
  --or-dim: rgba(255,77,0,.12);
  --or-glow: rgba(255,77,0,.25);
  --bg: #080808;
  --s1: #101010;
  --s2: #161616;
  --bd: rgba(255,255,255,.06);
  --tx: #F0EDE8;
  --mt: #555;
  --dm: #888;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
@keyframes rotate {
  to { transform: rotate(360deg); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}

.animate-up {
  animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── APPS DATA ───────────────────────────────────────────── */
const APPS = [
  {
    id: 1,
    slug: 'fourseconds',
    name: 'fourseconds',
    tag: 'App',
    desc: 'Aplicação web disponível online.',
    url: 'https://kvothedarinha.github.io/fourseconds',
    icon: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    ),
  },
  {
    id: 2,
    slug: 'highmarketing',
    name: 'highmarketing',
    tag: 'Marketing',
    desc: 'Aplicação web disponível online.',
    url: 'https://kvothedarinha.github.io/highmarketing',
    icon: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
    ),
  },
  {
    id: 3,
    slug: 'pontodasrimas',
    name: 'pontodasrimas',
    tag: 'Criativo',
    desc: 'Aplicação web disponível online.',
    url: 'https://kvothedarinha.github.io/pontodasrimas',
    icon: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
    ),
  },
  {
    id: 4,
    slug: 'oceano',
    name: 'Oceano Surfwear',
    tag: 'Relatório',
    desc: 'Relatório de Growth Marketing — Abril 2026.',
    url: './relatorio-oceano.html',
    icon: (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <path d="M2 12c2-4 6-4 8 0s6 4 8 0"/>
        <path d="M2 18c2-4 6-4 8 0s6 4 8 0"/>
        <path d="M2 6c2-4 6-4 8 0s6 4 8 0"/>
      </svg>
    ),
  },
];

/* ── CLOCK ───────────────────────────────────────────────── */
function Clock() {
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const h = String(time.getHours()).padStart(2, '0');
  const m = String(time.getMinutes()).padStart(2, '0');
  const s = String(time.getSeconds()).padStart(2, '0');

  return (
    <span style={{
      fontFamily: "'Syne', sans-serif",
      fontSize: 13,
      fontWeight: 700,
      letterSpacing: '0.08em',
      color: 'var(--dm)',
    }}>
      {h}<span style={{ opacity: 0.4, animation: 'pulse 1s infinite' }}>:</span>
      {m}<span style={{ opacity: 0.4, animation: 'pulse 1s infinite' }}>:</span>
      {s}
    </span>
  );
}

/* ── APP CARD ─────────────────────────────────────────────── */
function AppCard({ app, index }) {
  const [hovered, setHovered] = useState(false);
  const [pressed, setPressed] = useState(false);

  const delay = `${0.08 + index * 0.07}s`;

  return (
    <a
      href={app.url}
      target={app.url.startsWith('http') ? '_blank' : '_self'}
      rel="noopener noreferrer"
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => { setHovered(false); setPressed(false); }}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      className="animate-up"
      style={{
        animationDelay: delay,
        display: 'flex',
        flexDirection: 'column',
        textDecoration: 'none',
        color: 'inherit',
        background: hovered ? 'var(--s2)' : 'var(--s1)',
        border: `1px solid ${hovered ? 'rgba(255,77,0,.3)' : 'var(--bd)'}`,
        borderRadius: 2,
        padding: 'clamp(28px, 4vw, 44px)',
        position: 'relative',
        overflow: 'hidden',
        transform: pressed ? 'scale(0.985)' : 'scale(1)',
        transition: 'background 0.2s, border-color 0.2s, transform 0.12s, box-shadow 0.3s',
        boxShadow: hovered ? '0 0 0 1px rgba(255,77,0,.15), 0 20px 60px rgba(0,0,0,.4)' : 'none',
        cursor: 'pointer',
      }}
    >
      {/* Top bar */}
      <div style={{
        position: 'absolute',
        top: 0, left: 0, right: 0,
        height: 2,
        background: 'var(--or)',
        transform: `scaleX(${hovered ? 1 : 0})`,
        transformOrigin: 'left',
        transition: 'transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)',
      }} />

      {/* Glow */}
      {hovered && (
        <div style={{
          position: 'absolute',
          top: -60, right: -60,
          width: 180, height: 180,
          borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(255,77,0,.08) 0%, transparent 70%)',
          pointerEvents: 'none',
        }} />
      )}

      {/* Header row */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          width: 44, height: 44,
          background: hovered ? 'var(--or-dim)' : 'rgba(255,255,255,.04)',
          border: `1px solid ${hovered ? 'rgba(255,77,0,.3)' : 'var(--bd)'}`,
          borderRadius: 2,
          color: hovered ? 'var(--or)' : 'var(--dm)',
          transition: 'background 0.2s, color 0.2s, border-color 0.2s',
        }}>
          {app.icon}
        </div>
        <span style={{
          fontFamily: "'Syne', sans-serif",
          fontSize: 9,
          fontWeight: 700,
          letterSpacing: '0.18em',
          textTransform: 'uppercase',
          color: hovered ? 'var(--or)' : 'var(--mt)',
          transition: 'color 0.2s',
        }}>
          {String(app.id).padStart(2, '0')} · {app.tag}
        </span>
      </div>

      {/* Name */}
      <div style={{
        fontFamily: "'Syne', sans-serif",
        fontSize: 'clamp(20px, 2.5vw, 28px)',
        fontWeight: 800,
        letterSpacing: '-0.02em',
        lineHeight: 1.1,
        marginBottom: 10,
        color: 'var(--tx)',
      }}>
        {app.name}
      </div>

      {/* Desc */}
      <div style={{
        fontSize: 13,
        color: 'var(--dm)',
        lineHeight: 1.65,
        flex: 1,
        marginBottom: 32,
      }}>
        {app.desc}
      </div>

      {/* CTA */}
      <div style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: hovered ? 14 : 8,
        fontFamily: "'Syne', sans-serif",
        fontSize: 10,
        fontWeight: 700,
        letterSpacing: '0.12em',
        textTransform: 'uppercase',
        color: hovered ? 'var(--or)' : 'var(--dm)',
        transition: 'color 0.2s, gap 0.25s',
      }}>
        Acessar
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </a>
  );
}

/* ── MAIN APP ─────────────────────────────────────────────── */
function App() {
  const [ready, setReady] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setReady(true), 60);
    return () => clearTimeout(t);
  }, []);

  const today = new Date().toLocaleDateString('pt-BR', {
    weekday: 'long', day: 'numeric', month: 'long',
  });

  return (
    <div style={{
      minHeight: '100svh',
      display: 'flex',
      flexDirection: 'column',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* Ambient background */}
      <div style={{
        position: 'fixed',
        inset: 0,
        pointerEvents: 'none',
        zIndex: 0,
        background: `
          radial-gradient(ellipse 55% 45% at 85% 15%, rgba(255,77,0,.07) 0%, transparent 65%),
          radial-gradient(ellipse 40% 50% at 10% 85%, rgba(255,77,0,.04) 0%, transparent 60%)
        `,
      }} />

      {/* Subtle grid */}
      <div style={{
        position: 'fixed',
        inset: 0,
        pointerEvents: 'none',
        zIndex: 0,
        backgroundImage: `
          linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px)
        `,
        backgroundSize: '80px 80px',
        maskImage: 'radial-gradient(ellipse 85% 85% at center, black 20%, transparent 80%)',
      }} />

      {/* Content */}
      <div style={{
        position: 'relative',
        zIndex: 1,
        flex: 1,
        display: 'flex',
        flexDirection: 'column',
        padding: 'clamp(24px, 5vw, 56px)',
        maxWidth: 1280,
        margin: '0 auto',
        width: '100%',
      }}>

        {/* Top bar */}
        <header
          className="animate-up"
          style={{
            animationDelay: '0s',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            marginBottom: 'clamp(56px, 10vw, 100px)',
            paddingBottom: 24,
            borderBottom: '1px solid var(--bd)',
          }}
        >
          <div style={{
            fontFamily: "'Syne', sans-serif",
            fontSize: 13,
            fontWeight: 700,
            letterSpacing: '0.14em',
            textTransform: 'uppercase',
            color: 'var(--dm)',
          }}>
            K <span style={{ color: 'var(--or)', margin: '0 2px' }}>·</span> World
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
            <span style={{ fontSize: 11, color: 'var(--mt)', letterSpacing: '0.05em' }}>
              {today}
            </span>
            <Clock />
          </div>
        </header>

        {/* Hero text */}
        <div style={{ marginBottom: 'clamp(40px, 7vw, 72px)' }}>
          <div
            className="animate-up"
            style={{
              animationDelay: '0.03s',
              fontFamily: "'Syne', sans-serif",
              fontSize: 10,
              fontWeight: 700,
              letterSpacing: '0.25em',
              textTransform: 'uppercase',
              color: 'var(--or)',
              marginBottom: 16,
            }}
          >
            Hub de Aplicações
          </div>
          <h1
            className="animate-up"
            style={{
              animationDelay: '0.06s',
              fontFamily: "'Syne', sans-serif",
              fontSize: 'clamp(40px, 8vw, 96px)',
              fontWeight: 800,
              lineHeight: 0.9,
              letterSpacing: '-0.04em',
              marginBottom: 20,
            }}
          >
            Suas<br />
            <span style={{
              background: 'linear-gradient(90deg, var(--or) 0%, #ff7a40 50%, var(--or) 100%)',
              backgroundSize: '200% auto',
              WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent',
              backgroundClip: 'text',
              animation: 'shimmer 3s linear infinite',
            }}>
              aplicações.
            </span>
          </h1>
          <p
            className="animate-up"
            style={{
              animationDelay: '0.09s',
              fontSize: 'clamp(14px, 1.8vw, 16px)',
              color: 'var(--dm)',
              maxWidth: 420,
              lineHeight: 1.65,
            }}
          >
            Tudo centralizado. Acesse qualquer ferramenta com um clique.
          </p>
        </div>

        {/* Apps grid */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(min(100%, 280px), 1fr))',
          gap: 2,
          flex: 1,
        }}>
          {APPS.map((app, i) => (
            <AppCard key={app.id} app={app} index={i} />
          ))}
        </div>

        {/* Footer */}
        <footer
          className="animate-up"
          style={{
            animationDelay: '0.5s',
            marginTop: 'clamp(40px, 6vw, 64px)',
            paddingTop: 24,
            borderTop: '1px solid var(--bd)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            flexWrap: 'wrap',
            gap: 12,
          }}
        >
          <span style={{
            fontFamily: "'Syne', sans-serif",
            fontSize: 11,
            fontWeight: 700,
            letterSpacing: '0.12em',
            textTransform: 'uppercase',
            color: 'var(--mt)',
          }}>
            K <span style={{ color: 'var(--or)' }}>·</span> World
          </span>
          <span style={{ fontSize: 11, color: 'var(--mt)' }}>
            {APPS.length} aplicações · hub pessoal
          </span>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K·World</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { min-height: 100%; }

:root {
  --bg:     #0b0905;
  --s1:     #141008;
  --s2:     #1c160e;
  --bd:     rgba(200,169,110,.12);
  --bd2:    rgba(200,169,110,.22);
  --am:     #c8a96e;
  --am-dim: rgba(200,169,110,.1);
  --tx:     #e8dfc8;
  --mt:     #6b5f45;
  --dm:     #9b8c72;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9000;
  opacity: .028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
@keyframes slowRotate {
  to { transform: rotate(360deg); }
}

.up { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const APPS = [
  {
    id: 1,
    name: 'fourseconds',
    tagline: 'quatro segundos para respirar',
    url: 'https://fourseconds.lovable.app/',
    favicon: 'https://fourseconds.lovable.app/favicon.ico',
  },
  {
    id: 2,
    name: 'highmarketing',
    tagline: 'estratégia que conecta pessoas',
    url: 'https://highmarketing.lovable.app/',
    favicon: 'https://highmarketing.lovable.app/favicon.ico',
  },
  {
    id: 3,
    name: 'pontodasrimas',
    tagline: 'onde as palavras encontram ritmo',
    url: 'https://pontodasrimas.lovable.app/',
    favicon: 'https://pontodasrimas.lovable.app/favicon.ico',
  },
  {
    id: 4,
    name: 'Oceano Surfwear',
    tagline: 'crescimento com propósito',
    url: './relatorio-oceano.html',
    favicon: null,
  },
];

/* ── FAVICON ──────────────────────────────────── */
function AppLogo({ src, name }) {
  const [err, setErr] = useState(false);

  if (!src || err) {
    return (
      <div style={{
        width: 52, height: 52,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 22,
        fontFamily: "'Fraunces', serif",
        fontStyle: 'italic',
        color: 'var(--am)',
        opacity: .7,
      }}>
        {name[0].toUpperCase()}
      </div>
    );
  }

  return (
    <img
      src={src}
      alt={name}
      onError={() => setErr(true)}
      style={{ width: 52, height: 52, objectFit: 'contain', borderRadius: 10, display: 'block' }}
    />
  );
}

/* ── APP CARD ─────────────────────────────────── */
function AppCard({ app, delay }) {
  const [hov, setHov] = useState(false);

  return (
    <a
      href={app.url}
      target={app.url.startsWith('http') ? '_blank' : '_self'}
      rel="noopener noreferrer"
      className="up"
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        animationDelay: delay,
        display: 'flex',
        flexDirection: 'column',
        textDecoration: 'none',
        color: 'inherit',
        background: hov ? 'var(--s2)' : 'var(--s1)',
        border: `1px solid ${hov ? 'var(--bd2)' : 'var(--bd)'}`,
        borderRadius: 14,
        padding: 'clamp(24px,3.5vw,36px)',
        transition: 'background .25s, border-color .25s, box-shadow .3s, transform .2s',
        boxShadow: hov
          ? '0 0 0 1px rgba(200,169,110,.1), 0 24px 64px rgba(0,0,0,.55)'
          : '0 1px 2px rgba(0,0,0,.3)',
        transform: hov ? 'translateY(-3px)' : 'none',
        cursor: 'pointer',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {/* Warm glow on hover */}
      {hov && (
        <div style={{
          position: 'absolute',
          bottom: -40, left: -40,
          width: 160, height: 160,
          borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(200,169,110,.06) 0%, transparent 70%)',
          pointerEvents: 'none',
        }} />
      )}

      {/* Logo */}
      <div style={{ marginBottom: 20 }}>
        <AppLogo src={app.favicon} name={app.name} />
      </div>

      {/* Name */}
      <div style={{
        fontFamily: "'Fraunces', serif",
        fontStyle: 'italic',
        fontSize: 'clamp(18px,2.2vw,22px)',
        fontWeight: 400,
        letterSpacing: '-.01em',
        color: 'var(--tx)',
        marginBottom: 8,
        lineHeight: 1.2,
      }}>
        {app.name}
      </div>

      {/* Tagline */}
      <div style={{
        fontSize: 12,
        color: 'var(--mt)',
        lineHeight: 1.6,
        flex: 1,
        marginBottom: 24,
        fontWeight: 300,
        letterSpacing: '.02em',
      }}>
        {app.tagline}
      </div>

      {/* CTA */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        gap: 6,
        fontSize: 11,
        fontFamily: "'Fraunces', serif",
        fontStyle: 'italic',
        color: hov ? 'var(--am)' : 'var(--dm)',
        transition: 'color .2s',
        letterSpacing: '.03em',
      }}>
        entrar
        <svg
          width="11" height="11"
          viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2"
          strokeLinecap="round"
          style={{ transform: hov ? 'translateX(3px)' : 'none', transition: 'transform .2s' }}
        >
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </a>
  );
}

/* ── BACKGROUND WORLD ─────────────────────────── */
function WorldBg() {
  return (
    <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0, overflow: 'hidden' }}>
      {/* Warm radial light */}
      <div style={{
        position: 'absolute',
        top: '30%', left: '50%',
        transform: 'translate(-50%, -50%)',
        width: 700, height: 700,
        borderRadius: '50%',
        background: 'radial-gradient(circle, rgba(200,169,110,.055) 0%, transparent 65%)',
      }} />

      {/* Topographic rings */}
      {[180, 300, 420, 540, 660, 780].map((r, i) => (
        <div key={i} style={{
          position: 'absolute',
          top: '30%', left: '50%',
          width: r, height: r,
          marginTop: -r/2, marginLeft: -r/2,
          borderRadius: '50%',
          border: `1px solid rgba(200,169,110,${0.055 - i * 0.007})`,
        }} />
      ))}

      {/* Scattered dots — stars / seeds */}
      {[
        [12,18],[88,8],[25,72],[75,55],[60,20],[40,85],
        [92,40],[5,50],[55,90],[80,75],[18,35],[68,10],
      ].map(([x, y], i) => (
        <div key={i} style={{
          position: 'absolute',
          left: `${x}%`, top: `${y}%`,
          width: 2, height: 2,
          borderRadius: '50%',
          background: `rgba(200,169,110,${0.12 + (i % 3) * 0.06})`,
        }} />
      ))}
    </div>
  );
}

/* ── CLOCK ────────────────────────────────────── */
function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  return (
    <span style={{
      fontFamily: "'Fraunces', serif",
      fontStyle: 'italic',
      fontSize: 13,
      color: 'var(--mt)',
      letterSpacing: '.03em',
    }}>
      {String(t.getHours()).padStart(2,'0')}
      <span style={{ opacity: .4 }}>:</span>
      {String(t.getMinutes()).padStart(2,'0')}
    </span>
  );
}

/* ── APP ──────────────────────────────────────── */
function App() {
  const date = new Date().toLocaleDateString('pt-BR', {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  return (
    <div style={{ position: 'relative', zIndex: 1, minHeight: '100svh', display: 'flex', flexDirection: 'column' }}>
      <WorldBg />

      <div style={{
        flex: 1,
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'center',
        padding: 'clamp(32px,6vw,72px) clamp(24px,6vw,80px)',
        maxWidth: 1100,
        margin: '0 auto',
        width: '100%',
      }}>

        {/* Header */}
        <header className="up" style={{ animationDelay: '0s', marginBottom: 'clamp(48px,8vw,80px)' }}>
          <div style={{
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            paddingBottom: 20,
            borderBottom: '1px solid var(--bd)',
          }}>
            <div style={{
              fontFamily: "'Fraunces', serif",
              fontStyle: 'italic',
              fontSize: 14,
              fontWeight: 300,
              color: 'var(--dm)',
              letterSpacing: '.04em',
            }}>
              k<span style={{ color: 'var(--am)', margin: '0 1px' }}>·</span>world
            </div>
            <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
              <span style={{ fontSize: 11, color: 'var(--mt)', fontWeight: 300 }}>{date}</span>
              <Clock />
            </div>
          </div>
        </header>

        {/* Hero */}
        <div style={{ marginBottom: 'clamp(48px,7vw,72px)' }}>
          <h1
            className="up"
            style={{
              animationDelay: '.05s',
              fontFamily: "'Fraunces', serif",
              fontStyle: 'italic',
              fontWeight: 300,
              fontSize: 'clamp(52px,10vw,120px)',
              lineHeight: .88,
              letterSpacing: '-.04em',
              color: 'var(--tx)',
              marginBottom: 20,
            }}
          >
            um mundo<br />
            <span style={{ color: 'var(--am)', fontWeight: 400 }}>só seu.</span>
          </h1>
          <p
            className="up"
            style={{
              animationDelay: '.1s',
              fontSize: 14,
              color: 'var(--mt)',
              fontWeight: 300,
              lineHeight: 1.7,
              maxWidth: 340,
              letterSpacing: '.02em',
            }}
          >
            cada portal, um novo horizonte.
          </p>
        </div>

        {/* Grid */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fill, minmax(min(100%, 220px), 1fr))',
          gap: 'clamp(10px,1.5vw,16px)',
        }}>
          {APPS.map((app, i) => (
            <AppCard
              key={app.id}
              app={app}
              delay={`${.15 + i * .07}s`}
            />
          ))}
        </div>

        {/* Footer */}
        <footer
          className="up"
          style={{
            animationDelay: '.55s',
            marginTop: 'clamp(40px,6vw,64px)',
            paddingTop: 20,
            borderTop: '1px solid var(--bd)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            flexWrap: 'wrap',
            gap: 10,
          }}
        >
          <span style={{
            fontFamily: "'Fraunces', serif",
            fontStyle: 'italic',
            fontSize: 12,
            color: 'var(--mt)',
            fontWeight: 300,
          }}>
            k<span style={{ color: 'var(--am)' }}>·</span>world
          </span>
          <span style={{ fontSize: 11, color: 'var(--mt)', fontWeight: 300, letterSpacing: '.04em' }}>
            {APPS.length} portais abertos
          </span>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
